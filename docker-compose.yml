version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: qlpt_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quanlyphongtro}
      MYSQL_USER: ${MYSQL_USER:-qlpt}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qlpt123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: qlpt_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: quanlyphongtro
      DB_USER: qlpt
      DB_PASSWORD: qlpt123
      JWT_SECRET: ${JWT_SECRET:-my_secret_key_docker}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: qlpt_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
