services:
  mysql:
    image: mysql:8.0
    container_name: qlpt_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: quanlyphongtro
      MYSQL_USER: qlpt
      MYSQL_PASSWORD: qlpt123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: qlpt_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: quanlyphongtro
      DB_USER: qlpt
      DB_PASSWORD: qlpt123
      JWT_SECRET: QLPT_SECRET_KEY_2026
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: viethoang101004@gmail.com
      EMAIL_PASSWORD: gfqi afjf kdkr mhnx
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: qlpt_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:

networks:
  default:
    name: qlpt_network
